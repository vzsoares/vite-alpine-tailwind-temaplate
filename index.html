<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Per-route title/description/keywords/author/canonical + OG/Twitter
             tags are injected here by the render-jsx-app plugin (from config). -->
        <!--head-->

        <link rel="icon" href="/favicon.ico" />

        <!-- Styles. Absolute paths so this one template also works when served
             at sub-paths like /about/ (see the render-jsx-app plugin). -->
        <link rel="stylesheet" href="/src/styles.css" />
        <script type="module" src="/src/app.ts"></script>
    </head>
    <body
        x-data="{
            darkMode: JSON.parse(localStorage.getItem('darkMode')) ??
                window.matchMedia('(prefers-color-scheme: dark)').matches
        }"
        x-init="$watch('darkMode', (value) => localStorage.setItem('darkMode', value))"
        :class="darkMode ? 'dark bg-gray-900 text-white' : 'bg-white text-gray-900'"
        class="m-0 p-0 font-sans transition-colors duration-300"
        x-cloak
    >
        <!-- The JSX page is prerendered into this element at build time by the
             render-jsx-app plugin (see ROUTES); Alpine then hydrates it. -->
        <div id="app"><!--app--></div>
    </body>
</html>
