<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vite Alpine Tailwind Template</title>
        <meta
            name="description"
            content="A starter template using Vite, Alpine.js and Tailwind CSS"
        />
        <meta
            name="keywords"
            content="vite, alpine.js, tailwind css, template, starter"
        />
        <meta name="author" content="vzsoares" />

        <!-- Open Graph meta tags for social sharing -->
        <meta property="og:title" content="Vite Alpine Tailwind Template" />
        <meta
            property="og:description"
            content="A modern starter template with Vite, Alpine.js and Tailwind CSS"
        />
        <meta property="og:type" content="website" />
        <link rel="icon" href="/favicon.ico" />

        <!-- Styles. Absolute paths so this one template also works when served
             at sub-paths like /about/ (see the render-jsx-app plugin). -->
        <link rel="stylesheet" href="/src/styles.css" />
        <script type="module" src="/src/app.ts"></script>
    </head>
    <body
        x-data="{
            darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches
        }"
        :class="darkMode ? 'dark bg-gray-900 text-white' : 'bg-white text-gray-900'"
        class="m-0 p-0 font-sans transition-colors duration-300"
        x-cloak
    >
        <!-- The JSX app (src/views/app.tsx) is prerendered into this element at
             build time by the render-jsx-app plugin; Alpine then hydrates it. -->
        <div id="app"><!--app--></div>
    </body>
</html>
